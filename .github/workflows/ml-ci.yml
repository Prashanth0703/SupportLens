name: ML CI

on:
  push:
    paths:
      - "ml/**"
      - ".github/workflows/ml-ci.yml"
  pull_request:
    paths:
      - "ml/**"
      - ".github/workflows/ml-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt
      - run: pytest -q
